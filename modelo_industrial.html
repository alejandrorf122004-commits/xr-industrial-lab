<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelo industrial con primitivas</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>
</head>
<body>
  <a-scene>
    <!-- Piso -->
    <a-plane position="0 0 -8" rotation="-90 0 0" width="20" height="20" color="#B7E4C7"></a-plane>

    <!-- Pared de fondo -->
    <a-plane position="0 5 -15" width="20" height="10" color="#E9ECEF"></a-plane>

    <!-- Base principal -->
    <a-box position="0 0.5 -8" width="4" height="1" depth="2" color="#6C757D"></a-box>

    <!-- Columnas -->
    <a-box position="-1.5 2.5 -8" width="0.3" height="4" depth="0.3" color="#495057"></a-box>
    <a-box position="1.5 2.5 -8" width="0.3" height="4" depth="0.3" color="#495057"></a-box>

    <!-- Viga superior -->
    <a-box position="0 4.3 -8" width="3.4" height="0.3" depth="0.3" color="#3A86FF"></a-box>

    <!-- Tanque -->
    <a-cylinder position="-4 1.5 -7" radius="1" height="3" color="#ADB5BD"></a-cylinder>
    <a-cylinder position="-4 3.1 -7" radius="1.05" height="0.15" color="#868E96"></a-cylinder>

    <!-- Banda transportadora -->
    <a-box position="4 0.6 -8" width="5" height="0.4" depth="1.8" color="#343A40"></a-box>

    <!-- Rodillos -->
    <a-cylinder position="1.7 0.6 -8" radius="0.25" height="1.8" rotation="90 0 0" color="#6C757D"></a-cylinder>
    <a-cylinder position="6.3 0.6 -8" radius="0.25" height="1.8" rotation="90 0 0" color="#6C757D"></a-cylinder>

    <!-- Caja -->
    <a-box position="4 1.05 -8" width="0.8" height="0.8" depth="0.8" color="#D00000"></a-box>

    <!-- Sensores -->
    <a-sphere position="2 1.8 -7" radius="0.2" color="#00FF00"></a-sphere>
    <a-sphere position="6 1.8 -7" radius="0.2" color="#FFBE0B"></a-sphere>
    <a-sphere position="0 4.8 -8" radius="0.18" color="#FF006E"></a-sphere>

    <!-- Iluminación -->
    <a-light type="ambient" color="#FFFFFF" intensity="0.9"></a-light>
    <a-light type="directional" position="2 6 4" intensity="0.7"></a-light>

    <!-- Cámara -->
    <a-camera position="0 2 6"></a-camera>

    <!-- Cielo -->
    <a-sky color="#DDEAF0"></a-sky>
  </a-scene>
</body>
</html>
