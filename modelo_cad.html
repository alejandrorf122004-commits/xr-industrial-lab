<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelo CAD AR - Meta Quest</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body style="margin:0;">

  <a-scene
    webxr="requiredFeatures: hit-test; optionalFeatures: dom-overlay, unbounded"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; colorManagement: true">

    <a-sky color="transparent"></a-sky>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="2 4 2" intensity="1"></a-light>

    <a-entity
      id="modelo"
      gltf-model="url(modelo.glb)"
      position="0 -10 -10"
      rotation="0 0 0"
      scale="0.01 0.01 0.01">
    </a-entity>

    <a-camera position="0 1.6 4"></a-camera>
  </a-scene>

  <!-- Botón AR -->
  <button id="btn-ar" style="
    position: fixed; bottom: 20px; right: 20px;
    padding: 14px 24px; font-size: 16px; font-weight: bold;
    background: #1a73e8; color: white;
    border: none; border-radius: 10px; cursor: pointer;">
    Entrar en AR
  </button>

  <!-- Botón VR -->
  <button id="btn-vr" style="
    position: fixed; bottom: 20px; left: 20px;
    padding: 14px 24px; font-size: 16px; font-weight: bold;
    background: #333; color: white;
    border: none; border-radius: 10px; cursor: pointer;">
    Entrar en VR
  </button>

  <!-- Estado -->
  <div id="estado" style="
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: white;
    padding: 10px 20px; border-radius: 8px; font-size: 14px;
    font-family: sans-serif; display: none;">
  </div>

  <!-- Indicador de carga -->
  <div id="cargando" style="
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7); color: white;
    padding: 16px 28px; border-radius: 10px; font-size: 16px;
    font-family: sans-serif;">
    Cargando modelo...
  </div>

  <script>
    const scene = document.querySelector('a-scene');
    const estado = document.getElementById('estado');

    function mostrarEstado(msg, color = 'rgba(0,0,0,0.7)') {
      estado.style.display = 'block';
      estado.style.background = color;
      estado.innerText = msg;
    }

    // Botón VR — usa WebXR nativo directamente
    document.getElementById('btn-vr').addEventListener('click', async () => {
      if (!navigator.xr) {
        mostrarEstado('❌ WebXR no disponible en este navegador', 'rgba(180,0,0,0.8)');
        return;
      }
      try {
        const supported = await navigator.xr.isSessionSupported('immersive-vr');
        if (!supported) {
          mostrarEstado('❌ VR no soportado en este dispositivo', 'rgba(180,0,0,0.8)');
          return;
        }
        mostrarEstado('Iniciando VR...');
        const session = await navigator.xr.requestSession('immersive-vr', {
          optionalFeatures: ['local-floor', 'bounded-floor']
        });
        scene.renderer.xr.setSession(session);
        mostrarEstado('✅ VR activo', 'rgba(0,120,0,0.8)');
      } catch (e) {
        mostrarEstado('❌ Error VR: ' + e.message, 'rgba(180,0,0,0.8)');
      }
    });

    // Botón AR — usa WebXR nativo directamente
    document.getElementById('btn-ar').addEventListener('click', async () => {
      if (!navigator.xr) {
        mostrarEstado('❌ WebXR no disponible en este navegador', 'rgba(180,0,0,0.8)');
        return;
      }
      try {
        const supported = await navigator.xr.isSessionSupported('immersive-ar');
        if (!supported) {
          mostrarEstado('❌ AR no soportado en este dispositivo', 'rgba(180,0,0,0.8)');
          return;
        }
        mostrarEstado('Iniciando AR...');
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['hit-test'],
          optionalFeatures: ['dom-overlay', 'unbounded'],
          domOverlay: { root: document.body }
        });
        scene.renderer.xr.setSession(session);
        mostrarEstado('✅ AR activo', 'rgba(0,120,0,0.8)');
      } catch (e) {
        mostrarEstado('❌ Error AR: ' + e.message, 'rgba(180,0,0,0.8)');
      }
    });

    document.getElementById('modelo').addEventListener('model-loaded', () => {
      document.getElementById('cargando').style.display = 'none';
    });

    document.getElementById('modelo').addEventListener('model-error', () => {
      document.getElementById('cargando').innerText = '❌ Error al cargar modelo.glb';
    });
  </script>

</body>
</html>
